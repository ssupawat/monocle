<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Try pan gestures</title>
<style>
  * { margin:0; box-sizing:border-box; }
  body { font-family:system-ui; overflow:hidden; height:100vh; background:#F4F1EA; color:#26323E; }
  .bar { position:fixed; top:1rem; left:50%; transform:translateX(-50%); z-index:10;
    display:flex; gap:0.3rem; background:#fff; border:0.0625rem solid #ccc; border-radius:99px; padding:0.25rem;
    box-shadow:0 0.15rem 0.5rem #0002; }
  .bar button { font:inherit; font-size:0.8rem; font-weight:600; border:none; border-radius:99px;
    padding:0.35rem 0.7rem; cursor:pointer; background:transparent; color:#555; }
  .bar button:hover { background:#f0f0f0; }
  .bar button.active { background:#3B5BDB; color:#fff; }
  .hint { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%);
    font-size:0.8rem; color:#888; background:#fff; padding:0.3rem 0.8rem; border-radius:99px;
    box-shadow:0 0.1rem 0.3rem #0001; pointer-events:none; }
  .canvas { position:absolute; inset:0; overflow:hidden; cursor:crosshair;
    background-image:radial-gradient(#ccc 0.09375rem, transparent 0.09375rem); background-size:1.4rem 1.4rem; }
  .inner { position:absolute; width:3000px; height:2000px; transform-origin:0 0; }
  .box { position:absolute; width:8rem; height:4rem; background:#fff; border:0.0625rem solid #ccc;
    border-radius:0.5rem; display:grid; place-items:center; font-size:0.85rem; font-weight:600;
    box-shadow:0 0.15rem 0.5rem #0001; user-select:none; }
</style>
</head>
<body>
<div class="canvas" id="c">
  <div class="inner" id="inner">
    <div class="box" style="top:200px;left:300px">Block A</div>
    <div class="box" style="top:200px;left:600px">Block B</div>
    <div class="box" style="top:500px;left:450px">Block C</div>
    <div class="box" style="top:700px;left:200px">Block D</div>
    <div class="box" style="top:900px;left:700px">Block E</div>
  </div>
</div>
<div class="bar" id="bar">
  <button data-m="space" class="active">Space+drag</button>
  <button data-m="middle">Middle-click drag</button>
  <button data-m="alt">Alt+drag</button>
  <button data-m="right">Right-click drag</button>
  <button data-m="twofinger">Two-finger pan</button>
  <button data-m="scroll">Scroll=pan</button>
</div>
<div class="hint" id="hint">Hold Space, then drag to pan</div>
<script>
const c=document.getElementById('c'), inner=document.getElementById('inner'), bar=document.getElementById('bar'), hint=document.getElementById('hint');
let px=0,py=0,dragging=false,sx,sy;
const modes={space:'Hold Space, then drag to pan',middle:'Click middle mouse button, then drag to pan',
  alt:'Hold Alt, then drag to pan',right:'Hold right mouse button, then drag to pan',
  twofinger:'Drag with two fingers on trackpad to pan',scroll:'Scroll wheel to pan (no zoom)'};
let mode='space';
function apply(){inner.style.transform=`translate(${px}px,${py}px)`}
function startPan(){dragging=true;c.style.cursor='grabbing'}
function movePan(x,y){if(!dragging)return;px+=x-mx;py+=y-my;mx=x;my=y;apply()}
function endPan(){dragging=false;c.style.cursor=mode==='scroll'?'crosshair':'grab'}
let mx=0,my=0;
c.addEventListener('mousedown',e=>{
  sx=e.clientX;sy=e.clientY;mx=e.clientX;my=e.clientY;
  if(mode==='space'&&!e.altKey&&!e.metaKey&&!e.ctrlKey&&e.key!==' '&&(!e.buttons||e.button!==1))return;
  if(mode==='space'&&!e.repeat&&(document.activeElement===c||document.activeElement===document.body)){/*check space held via keydown*/}
  // check conditions per mode
  let ok=false;
  if(mode==='space'&&e.shiftKey===false&&e.altKey===false&&e.ctrlKey===false&&e.metaKey===false)ok=true;
  if(mode==='middle'&&e.button===1)ok=true;
  if(mode==='alt'&&e.altKey)ok=true;
  if(mode==='right'&&e.button===2)ok=true;
  if(ok){e.preventDefault();startPan()}
});
window.addEventListener('mousemove',e=>movePan(e.clientX,e.clientY));
window.addEventListener('mouseup',()=>endPan());
c.addEventListener('contextmenu',e=>e.preventDefault());
// Space key tracking
let spaceDown=false;
window.addEventListener('keydown',e=>{
  if(e.code==='Space'&&!e.repeat){spaceDown=true;c.style.cursor='grab'}
});
window.addEventListener('keyup',e=>{
  if(e.code==='Space'){spaceDown=false;c.style.cursor=mode==='scroll'?'crosshair':''}
});
// Fix space mousedown
c.addEventListener('mousedown',e=>{
  if(mode==='space'&&spaceDown&&e.button===0){e.preventDefault();mx=e.clientX;my=e.clientY;startPan()}
});
// Scroll mode
c.addEventListener('wheel',e=>{
  if(mode==='scroll'){e.preventDefault();px-=e.deltaX||0;py-=e.deltaY;apply()}
},{passive:false});
// Two-finger: use touch events for trackpad pinch/pan simulation via gesturestart
let touches=[];
c.addEventListener('touchstart',e=>{if(mode==='twofinger'&&e.touches.length===2){e.preventDefault();sx=e.touches[0].clientX;sy=e.touches[0].clientY;mx=sx;my=sy;startPan()}},{passive:false});
c.addEventListener('touchmove',e=>{if(mode==='twofinger'&&e.touches.length>=1){e.preventDefault();const t=e.touches[0];movePan(t.clientX,t.clientY)}},{passive:false});
c.addEventListener('touchend',()=>endPan());
// Bar clicks
bar.addEventListener('click',e=>{
  const btn=e.target.closest('button[data-m]');if(!btn)return;
  bar.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  mode=btn.dataset.m;
  hint.textContent=modes[mode];
  c.style.cursor=mode==='scroll'?'crosshair':'';
  px=0;py=0;apply();
});
</script>
</body>
</html>
